name: Build NixOS ISOs

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "fix/**"
      - "chore/**"
    paths:
      - "versions.nix"
      - "flake.nix"
      - "flake.lock"
      - "modules/**"
      - ".github/workflows/build-iso.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Format and lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run nixpkgs-fmt
        run: nix run nixpkgs#nixpkgs-fmt -- .

      - name: Run statix
        run: nix run nixpkgs#statix -- check .

      - name: Commit formatting fixes
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply nixpkgs-fmt"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  check:
    name: Nix flake check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.lint.outputs.sha }}

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake evaluation
        run: nix flake check --no-build

  build:
    name: ISO ${{ matrix.config }} (${{ matrix.arch }})
    needs: [lint, check]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: csfx-node-iso
            arch: amd64
            runner: ubuntu-latest
          - config: csfx-node-iso-arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.lint.outputs.sha }}

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.isoImage \
            --out-link result-${{ matrix.config }}

      - name: Collect ISO
        run: |
          ISO_PATH=$(readlink -f result-${{ matrix.config }}/iso/*.iso)
          OUTNAME="${{ matrix.config }}-${{ matrix.arch }}.iso"
          cp "${ISO_PATH}" "${OUTNAME}"
          sha256sum "${OUTNAME}" > "${OUTNAME}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-${{ matrix.arch }}
          path: |
            ${{ matrix.config }}-${{ matrix.arch }}.iso
            ${{ matrix.config }}-${{ matrix.arch }}.iso.sha256
          retention-days: 3

  release-dev:
    name: Publish dev ISOs
    runs-on: ubuntu-latest
    needs: build
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: csfx-*
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: |
          VERSION=$(grep -m1 'version' versions.nix | sed 's/[^"]*"\([^"]*\)".*/\1/')
          BRANCH="${{ github.ref_name }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Create versioned pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BRANCH="${{ steps.ver.outputs.branch }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's|/|-|g')
          TAG="iso-v${VERSION}--${BRANCH_SLUG}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          if gh release view "${TAG}" --repo "$REPO" > /dev/null 2>&1; then
            gh release upload "${TAG}" --repo "$REPO" *.iso *.sha256 --clobber
          else
            gh release create "${TAG}" \
              --title "ISO v${VERSION} (${BRANCH})" \
              --notes "" \
              --prerelease \
              *.iso *.sha256
          fi

          if [ "${BRANCH}" = "develop" ]; then
            SHA="${{ github.sha }}"
            gh api -X PATCH "repos/${REPO}/git/refs/tags/iso-latest" \
              -f sha="$SHA" -F force=true 2>/dev/null || \
            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/tags/iso-latest" -f sha="$SHA"
          fi

          echo "## ISO Download URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Config | Arch | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso | amd64 | ${BASE}/csfx-node-iso-amd64.iso |" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso-arm64 | arm64 | ${BASE}/csfx-node-iso-arm64-arm64.iso |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Publish ISOs to Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: csfx-*
          merge-multiple: true

      - name: Determine version
        id: ver
        run: |
          VERSION=$(grep 'version' versions.nix | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release upload "${TAG}" *.iso *.sha256 --clobber
          else
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --generate-notes \
              *.iso *.sha256
          fi

          echo "## ISO Download URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Config | Arch | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso | amd64 | ${BASE}/csfx-node-iso-amd64.iso |" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso-arm64 | arm64 | ${BASE}/csfx-node-iso-arm64-arm64.iso |" >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: Artifact Cleanup
    needs: [release-dev, release]
    if: always()
    uses: ./.github/workflows/artifact-cleanup.yml
    permissions:
      contents: write
      actions: write
