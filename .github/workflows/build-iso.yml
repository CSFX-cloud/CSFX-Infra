name: Build NixOS ISOs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "versions.nix"
      - "flake.nix"
      - "flake.lock"
      - "modules/**"
      - ".github/workflows/build-iso.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ISO ${{ matrix.config }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: csfx-node-iso
            arch: amd64
            runner: ubuntu-latest
          - config: csfx-node-iso-arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.isoImage \
            --out-link result-${{ matrix.config }}

      - name: Collect ISO
        run: |
          ISO_PATH=$(readlink -f result-${{ matrix.config }}/iso/*.iso)
          OUTNAME="${{ matrix.config }}-${{ matrix.arch }}.iso"
          cp "${ISO_PATH}" "${OUTNAME}"
          sha256sum "${OUTNAME}" > "${OUTNAME}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-${{ matrix.arch }}
          path: |
            ${{ matrix.config }}-${{ matrix.arch }}.iso
            ${{ matrix.config }}-${{ matrix.arch }}.iso.sha256
          retention-days: 3

  release-dev:
    name: Publish dev ISOs
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: csfx-*
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: |
          VERSION=$(grep 'version' versions.nix | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create versioned pre-release
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="iso-v${VERSION}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          gh release create "${TAG}" \
            --title "ISO v${VERSION}" \
            --notes "branch: develop" \
            --prerelease \
            *.iso *.sha256

          git tag -f iso-latest
          git push origin iso-latest --force

          echo "## ISO Download URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Config | Arch | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso | amd64 | ${BASE}/csfx-node-iso-amd64.iso |" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso-arm64 | arm64 | ${BASE}/csfx-node-iso-arm64-arm64.iso |" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Publish ISOs to Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: csfx-*
          merge-multiple: true

      - name: Determine version
        id: ver
        run: |
          VERSION=$(grep 'version' versions.nix | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload to release
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release upload "${TAG}" *.iso *.sha256 --clobber
          else
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --generate-notes \
              *.iso *.sha256
          fi

          echo "## ISO Download URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Config | Arch | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso | amd64 | ${BASE}/csfx-node-iso-amd64.iso |" >> $GITHUB_STEP_SUMMARY
          echo "| csfx-node-iso-arm64 | arm64 | ${BASE}/csfx-node-iso-arm64-arm64.iso |" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
