name: Build NixOS ISOs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "versions.nix"
      - "flake.nix"
      - "flake.lock"
      - "modules/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ISO ${{ matrix.config }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: csf-worker
            arch: amd64
            runner: ubuntu-latest
            system: x86_64-linux
          - config: csf-worker-arm64
            arch: arm64
            runner: ubuntu-24.04-arm
            system: aarch64-linux
          - config: csf-control-plane
            arch: amd64
            runner: ubuntu-latest
            system: x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.isoImage \
            --out-link result-${{ matrix.config }}

      - name: Collect ISO
        run: |
          ISO_PATH=$(readlink -f result-${{ matrix.config }}/iso/*.iso)
          VERSION=$(nix eval --raw .#nixosConfigurations.${{ matrix.config }}.config.system.nixos.label 2>/dev/null || echo "unknown")
          OUTNAME="${{ matrix.config }}-${{ matrix.arch }}.iso"
          cp "${ISO_PATH}" "${OUTNAME}"
          sha256sum "${OUTNAME}" > "${OUTNAME}.sha256"
          echo "iso=${OUTNAME}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-${{ matrix.arch }}
          path: |
            ${{ matrix.config }}-${{ matrix.arch }}.iso
            ${{ matrix.config }}-${{ matrix.arch }}.iso.sha256
          retention-days: 14

  release:
    name: Upload ISOs to Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: csf-*
          merge-multiple: true

      - name: Determine version
        id: ver
        run: |
          VERSION=$(grep 'version' versions.nix | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload to release
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release upload "${TAG}" *.iso *.sha256 --clobber
          else
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --generate-notes \
              *.iso *.sha256
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
