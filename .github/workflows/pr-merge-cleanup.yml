name: PR Merge Cleanup

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    name: Remove ISO pre-releases for merged branch
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Delete all ISO pre-releases for branch
        run: |
          set -euo pipefail

          BRANCH_SLUG=$(echo "$BRANCH" | sed 's|/|-|g')

          gh release list --repo "$REPO" --limit 200 \
            --json tagName,isPrerelease \
            | jq -r --arg slug "$BRANCH_SLUG" '
                .[]
                | select(.isPrerelease == true)
                | select(.tagName | endswith("--" + $slug))
                | .tagName
              ' \
            | while read -r tag; do
                echo "[INFO] deleting tag=${tag} branch=${BRANCH}"
                gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || \
                  echo "[WARN] delete failed tag=${tag}"
              done

      - name: Delete Actions artifacts for branch
        run: |
          set -euo pipefail

          gh api "repos/${REPO}/actions/artifacts?per_page=100" --paginate \
            | jq -r --arg branch "$BRANCH" '
                .artifacts[]
                | select(.expired == false)
                | select((.workflow_run.head_branch // "") == $branch)
                | .id | tostring
              ' \
            | while read -r id; do
                echo "[INFO] deleting artifact id=${id} branch=${BRANCH}"
                gh api -X DELETE "repos/${REPO}/actions/artifacts/${id}" || \
                  echo "[WARN] delete failed artifact_id=${id}"
              done
