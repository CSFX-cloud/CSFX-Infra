services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    restart: unless-stopped
    command:
      - etcd
      - --data-dir=/data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://localhost:2379
    volumes:
      - etcd-data:/data
    network_mode: host

  patroni:
    image: patroni:latest
    restart: unless-stopped
    env_file: /etc/csfx/patroni.env
    volumes:
      - patroni-data:/data
    network_mode: host
    depends_on:
      - etcd
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/primary || curl -sf http://localhost:8008/replica"]
      interval: 10s
      timeout: 5s
      retries: 18

  haproxy:
    image: haproxy:2.9-alpine
    restart: unless-stopped
    volumes:
      - /etc/csfx/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    network_mode: host
    depends_on:
      - patroni

  csfx-migrate:
    image: @image_api_gateway@
    restart: no
    env_file: /etc/csfx/cp.env
    network_mode: host
    command: ["/csfx-migrate"]
    depends_on:
      patroni:
        condition: service_healthy

  csfx-api-gateway:
    image: @image_api_gateway@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

  csfx-registry:
    image: @image_registry@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

  csfx-scheduler:
    image: @image_scheduler@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

  csfx-volume-manager:
    image: @image_volume_manager@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

  csfx-failover-controller:
    image: @image_failover_controller@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

  csfx-sdn-controller:
    image: @image_sdn_controller@
    restart: unless-stopped
    env_file: /etc/csfx/cp.env
    network_mode: host
    depends_on:
      csfx-migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_started

volumes:
  patroni-data:
  etcd-data:
